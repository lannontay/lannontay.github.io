<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

  <div class="flex h-screen w-full">

    <div class="w-[60%] bg-blue-700 flex flex-col justify-center px-24">
      <h1 class="text-white text-6xl font-bold mb-4 ml-16">GoFinance</h1>
      <p class="text-white text-lg opacity-90 mb-10 ml-16">The most popular peer to peer lending at SEA</p>
      <div>
        <button class="bg-blue-500 hover:bg-blue-600 text-white px-10 py-3 rounded-full font-medium transition ml-16">
          Read More
        </button>
      </div>
    </div>

    <div class="w-[40%] bg-white flex items-center justify-center">
      <div class="w-full max-w-md">
        
        <div class="mb-10">
          <h2 class="text-[26px] font-bold leading-none text-[#333333] mb-2">Hello!</h2>
          <p class="text-lg text-[#333333]">Sign up to get started</p>
        </div>

        <div class="flex flex-col space-y-6 border-solid">
          <div class="relative w-full">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-6 w-6 text-[#9ca3af]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
         </svg>
           </div>
           <input type="name" class="h-[60px] w-full rounded-full border border-[#d1d5db] bg-white pl-12 pr-4 text-[16px] text-[#333333] placeholder-[#9ca3af] outline-none" placeholder="Full Name">
           </div>
          <div class="relative w-full">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-6 w-6 text-[#9ca3af]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
         </svg>
           </div>
           <input type="email" class="h-[60px] w-full rounded-full border border-[#d1d5db] bg-white pl-12 pr-4 text-[16px] text-[#333333] placeholder-[#9ca3af] outline-none" placeholder="Email Address">
           </div>
         <div class="relative w-full">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="h-6 w-6 text-[#9ca3af]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2a5 5 0 00-5 5v3H6a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2v-8a2 2 0 00-2-2h-1V7a5 5 0 00-5-5zm-3 5a3 3 0 016 0v3H9V7zm3 11a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"></path>
         </svg>
           </div>
           <input type="password" class="h-[60px] w-full rounded-full border border-[#d1d5db] bg-white pl-12 pr-4 text-[16px] text-[#333333] placeholder-[#9ca3af] outline-none" placeholder="Password">
           </div>
          
          <button class="w-full bg-blue-600 text-white text-[14px] font-normal leading-none py-6 rounded-full shadow-lg shadow-blue-200">
            Register
          </button>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
